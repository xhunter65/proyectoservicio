<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vista 360 - San Miguel Zapotitlán</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"
    ></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Montserrat", "sans-serif"] },
            colors: { primary: "#0d7ff2" },
            borderRadius: { custom: "8px" },
          },
        },
      };
    </script>

    <style>
      @keyframes pulse-soft {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }
      .hotspot-pulse {
        animation: pulse-soft 2s infinite ease-in-out;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      #main-viewer {
        height: 70vh;
        min-height: 500px;
        position: relative;
        background-color: #000;
      }

      .pnlm-hotspot-base {
        display: none !important;
      }

      .viewer-overlay-static {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.4) 0%,
          transparent 20%,
          transparent 80%,
          rgba(0, 0, 0, 0.6) 100%
        );
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body class="bg-white text-zinc-900 font-sans antialiased">
    <header
      class="fixed top-0 left-0 right-0 z-50 p-6 flex justify-between items-center pointer-events-none"
    >
      <div
        class="pointer-events-auto bg-white/80 backdrop-blur-md border border-zinc-200 px-4 py-2 rounded-custom shadow-sm"
      >
        <h1 class="text-xl font-extrabold tracking-tight text-zinc-900">
          San Miguel Zapotitlán
        </h1>
        <p
          class="text-[10px] text-zinc-500 uppercase tracking-[0.2em] font-bold"
        >
          Sinaloa, México
        </p>
      </div>
      <div class="pointer-events-auto flex gap-2">
        <button
          onclick="window.history.back()"
          class="p-3 bg-white/80 backdrop-blur-md border border-zinc-200 rounded-full hover:bg-primary hover:text-white transition-colors shadow-sm"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
            ></path>
          </svg>
        </button>
      </div>
    </header>

    <main id="main-viewer">
      <div class="viewer-overlay-static"></div>

      <div
        class="absolute bottom-8 left-8 flex flex-col gap-4 pointer-events-auto z-20"
      >
        <div
          class="flex items-center gap-3 bg-black/40 backdrop-blur-md p-2 rounded-custom border border-white/10 text-white"
        >
          <button
            onclick="viewer.setHfov(viewer.getHfov() + 10)"
            class="p-2 hover:text-primary transition-colors"
          >
            <svg
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M20 12H4" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <span class="text-[10px] font-bold uppercase tracking-widest"
            >Zoom</span
          >
          <button
            onclick="viewer.setHfov(viewer.getHfov() - 10)"
            class="p-2 hover:text-primary transition-colors"
          >
            <svg
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 4v16m8-8H4"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>

      <div class="absolute bottom-8 right-8 pointer-events-auto z-20">
        <button
          onclick="viewer.toggleFullscreen()"
          class="p-3 bg-black/40 backdrop-blur-md border border-white/10 rounded-custom hover:bg-primary transition-all text-white shadow-lg"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"
            />
          </svg>
        </button>
      </div>
    </main>

    <div
      class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-lg bg-white shadow-2xl border border-zinc-200 p-6 rounded-custom translate-y-[150%] opacity-0 transition-all duration-300 z-[60]"
      id="info-panel"
    >
      <div class="flex justify-between items-start mb-4">
        <h3 class="text-xl font-bold text-primary" id="info-title">
          Nombre del Lugar
        </h3>
        <button class="text-zinc-400 hover:text-zinc-900" onclick="closeInfo()">
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M6 18L18 6M6 6l12 12"
              stroke-width="2"
              stroke-linecap="round"
            ></path>
          </svg>
        </button>
      </div>
      <p class="text-zinc-600 text-sm leading-relaxed" id="info-desc"></p>
    </div>

    <section class="py-16 px-6 lg:px-12 bg-white">
      <h2 class="text-3xl font-extrabold text-zinc-900 tracking-tight mb-8">
        Otros Puntos de Interés
      </h2>
      <div class="flex gap-6 overflow-x-auto hide-scrollbar pb-6">
        <div class="min-w-[300px] group cursor-pointer">
          <div
            class="relative overflow-hidden rounded-custom aspect-video mb-3"
          >
            <div
              class="w-full h-full bg-zinc-800 flex items-center justify-center"
            >
              <svg
                class="h-12 w-12 text-zinc-700"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                  stroke-width="1.5"
                />
                <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="1.5" />
              </svg>
            </div>
          </div>
          <h4 class="font-bold text-zinc-400 italic">
            Plaza Principal (Próximamente)
          </h4>
        </div>

        <div class="min-w-[300px] group cursor-pointer">
          <div
            class="relative overflow-hidden rounded-custom aspect-video mb-3"
          >
            <div
              class="w-full h-full bg-zinc-800 flex items-center justify-center"
            >
              <svg
                class="h-12 w-12 text-zinc-700"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                  stroke-width="1.5"
                />
                <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="1.5" />
              </svg>
            </div>
          </div>
          <h4 class="font-bold text-zinc-400 italic">
            Casa de la Cultura (Próximamente)
          </h4>
        </div>
      </div>
    </section>

    <script>
      const viewer = pannellum.viewer("main-viewer", {
        type: "equirectangular",
        panorama: "360_parroquia.jpg",
        autoLoad: true,
        autoRotate: -1.5,
        orientationOnDeviceMotion: true,
        showControls: false,
        hotSpots: [
          {
            pitch: -10,
            yaw: 30,
            cssClass: "custom-hotspot",
            createTooltipFunc: hotspotTooltip,
            createTooltipArgs: "casa",
          },
          {
            pitch: 5,
            yaw: 110,
            cssClass: "custom-hotspot",
            createTooltipFunc: hotspotTooltip,
            createTooltipArgs: "museo",
          },
        ],
      });

      function hotspotTooltip(hotSpotDiv, args) {
        hotSpotDiv.classList.add("group/hotspot", "cursor-pointer");
        const label =
          args === "casa" ? "Casa de la Cultura" : "Museo Comunitario";
        hotSpotDiv.innerHTML = `
            <div class="w-6 h-6 bg-primary rounded-full hotspot-pulse flex items-center justify-center border-2 border-white shadow-lg">
                <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
            <div class="absolute top-8 left-1/2 -translate-x-1/2 bg-black/80 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded border border-white/20 whitespace-nowrap opacity-0 group-hover/hotspot:opacity-100 transition-opacity">
                ${label}
            </div>
        `;
        hotSpotDiv.addEventListener("click", () => toggleInfo(args));
      }

      function toggleInfo(key) {
        const panel = document.getElementById("info-panel");
        const content = {
          casa: {
            title: "Casa de la Cultura",
            desc: "Espacio dedicado a preservar las tradiciones Yoreme y promover las artes locales.",
          },
          museo: {
            title: "Museo Comunitario",
            desc: "Resguarda piezas arqueológicas y vestimentas tradicionales de San Miguel Zapotitlán.",
          },
        };
        if (content[key]) {
          document.getElementById("info-title").innerText = content[key].title;
          document.getElementById("info-desc").innerText = content[key].desc;
          panel.classList.replace("translate-y-[150%]", "translate-y-0");
          panel.classList.replace("opacity-0", "opacity-100");
        }
      }

      function closeInfo() {
        const panel = document.getElementById("info-panel");
        panel.classList.replace("translate-y-0", "translate-y-[150%]");
        panel.classList.replace("opacity-100", "opacity-0");
      }

      function loadNewScene(url) {
        viewer.setPanorama(url);
      }
    </script>
  </body>
</html>
